<!DOCTYPE html>
<html>
    <head>

        <link rel="stylesheet" href="https://salescockpit.grob.local/office/OWAlight.css">

        <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
        <script type="text/javascript" src="https://salescockpit.grob.local/office/outlook/taskpane.js"></script>
        <!-- Setze Base URL -->
        <base href="https://github.com/Moerz-Christoph-GROB/SalesSphere-Addins">
          
        <script>
            Office.onReady(function () {
        
                const objCreateTaskPaneNamespace = globalThis.SalesSphere
                    ?.Outlook
                    ?.CreateTaskPane;
        
                if (objCreateTaskPaneNamespace && typeof objCreateTaskPaneNamespace.createTaskPane === "function") {
                    console.log("createTaskPane: createTaskPane will be called.");
                    objCreateTaskPaneNamespace.createTaskPane();
                }
            });
        </script>
